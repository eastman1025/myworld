<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>우주 챗봇 센터</title>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #chat-container { width: 500px; height: 70vh; border: 2px solid #00ffff; display: flex; flex-direction: column; background: rgba(0,0,0,0.9); border-radius: 15px; overflow: hidden; }
        #chat-content { flex: 1; overflow-y: auto; padding: 20px; font-size: 14px; }
        .input-area { display: flex; padding: 15px; background: #111; }
        input { flex: 1; background: transparent; border: 1px solid #00ffff; color: white; padding: 10px; border-radius: 5px; outline: none; }
        button { background: #00ffff; border: none; padding: 10px 20px; margin-left: 10px; cursor: pointer; border-radius: 5px; font-weight: bold; }
        .msg { margin-bottom: 10px; }
        .ai { color: #00ffff; }
    </style>
</head>
<body>
    <div id="chat-container">
        <div style="padding: 15px; background: #00ffff; color: black; font-weight: bold; text-align: center;">MISSION CONTROL: AI CHAT</div>
        <div id="chat-content"></div>
        <div class="input-area">
            <input type="text" id="chat-input" placeholder="AI에게 질문하세요...">
            <button onclick="askAI()">전송</button>
        </div>
    </div>
    <script>
        const input = document.getElementById('chat-input');
        const content = document.getElementById('chat-content');

        // 엔터키 처리
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') askAI();
        });

        async function askAI() {
            const input = document.getElementById('chat-input');
            const content = document.getElementById('chat-content');
            const question = input.value;
            
            if (!question) return;

            // 내 메시지
            content.innerHTML += `<div class="msg"><strong>나:</strong> ${question}</div>`;
            input.value = '';

            // 아스트로 답변 박스 생성
            const aiMsgDiv = document.createElement('div');
            aiMsgDiv.className = 'msg ai';
            aiMsgDiv.innerHTML = `<strong>아스트로:</strong> <span class="typing"></span>`;
            content.appendChild(aiMsgDiv);
            const typingSpan = aiMsgDiv.querySelector('.typing');
            
            content.scrollTop = content.scrollHeight;

            try {
                const response = await fetch('http://localhost:8000/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: question })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = ""; // 글자를 임시 보관할 버퍼

                // 출력 속도를 조절하는 내부 함수
                const sleep = (ms) => new Promise(res => setTimeout(res, ms));

                // 스트리밍 데이터 한 글자씩 출력
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const text = decoder.decode(value, { stream: true });
                    
                    // 한 글자씩 쪼개서 일정한 간격으로 출력
                    for (let char of text) {
                        typingSpan.innerText += char;
                        content.scrollTop = content.scrollHeight;
                        await sleep(30); // 30ms 간격으로 출력 (속도 조절 포인트!)
                    }
                }
            } catch (e) {
                typingSpan.innerText = "통신 중 블랙홀에 빠졌습니다. 다시 시도해 주세요.";
            }
        }
    </script>
</body>
</html>
